# tmux起動時のシェルをzshに
set-option -g default-shell /bin/zsh

# 更新する間隔を 1 秒
set-option -g status-interval 1

# Escの効きを良くする
set -s escape-time 0

# prefixキー
set -g prefix C-b
bind C-b send-prefix

# ウィンドウとペインの番号を1から始める
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# true color対応（Neovimの表示が綺麗になる）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 設定リロード
bind r source-file ~/.tmux.conf \; display-message "Reloaded"

# 直前のウィンドウにトグル
bind Tab last-window

# 画面分割のキーバインド設定（現在のディレクトリを維持）
bind s split-window -v -c "#{pane_current_path}"
bind d split-window -h -c "#{pane_current_path}"

# 新規ウィンドウでもカレントディレクトリを維持
bind c new-window -c "#{pane_current_path}"

# PaneをVim-likeに移動する
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vimのキーバインドでペインをリサイズ
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインを均等に再配置
bind = select-layout tiled
bind - select-layout even-vertical
bind | select-layout even-horizontal



# ウィンドウ名を実行中のプログラム名で自動更新
setw -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'
# シェルからのタイトル上書きを無視する（oh-my-zsh側で無効化済み）
set -g allow-rename on

# ウィンドウ名の変更（リネーム後は自動リネームを無効化して名前を維持）
bind , command-prompt -I "#W" "rename-window '%%'; setw automatic-rename off"

# ペイン分割線を見やすくする
set -g pane-border-style fg='#000000'
set -g pane-active-border-style fg='#000000'

# マウス操作を有効にする
set -g mouse on

# マウスドラッグ終了時の自動コピーを無効化
unbind -T copy-mode-vi MouseDragEnd1Pane

# コピーモード時のキーバインドをVimに
setw -g mode-keys vi

# prefix + v でコピーモードに入る
bind v copy-mode

# tmuxのコピーモードからクリップボードにコピー（macOS用にpbcopy）
# Neovimと同じキーバインド（Shift+H: 行頭, Shift+L: 行末）
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# クライアントが全て切断されたらセッションを自動削除
set -g destroy-unattached on

# サーバーの自動終了設定
set -g exit-empty on
set -g exit-unattached on

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-justify "left"
set -g @tmux-dotbar-session-position "right"
set -g @tmux-dotbar-window-status-separator "|"
set -g @tmux-dotbar-window-status-format " #I:#W "
set -g @tmux-dotbar-session-text " #h:#S "
set -g @tmux-dotbar-status-right-text " CPU:#{cpu_percentage} MEM:#{ram_percentage}  %m/%d %H:%M "

# continuum: 15分ごとに自動保存
set -g @continuum-save-interval '15'

# TPM初期化（この行は末尾に置く）
run '~/.tmux/plugins/tpm/tpm'
